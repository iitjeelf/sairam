<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LFJC Secure Exam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .exam-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .exam-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #4B0082;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: inline-block;
            width: 150px;
            font-weight: bold;
            color: #4B0082;
        }
        
        .form-group input {
            padding: 10px;
            border: 2px solid #4B0082;
            border-radius: 8px;
            width: 250px;
            font-size: 16px;
        }
        
        .question {
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            border-left: 5px solid #4B0082;
        }
        
        .question h3 {
            color: #4B0082;
            margin-bottom: 15px;
        }
        
        .optBtn {
            background: white;
            border: 2px solid #4B0082;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .optBtn:hover {
            background: #4B0082;
            color: white;
        }
        
        .optBtn.selected {
            background: #4B0082;
            color: white;
        }
        
        .nav-btn, .submit-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        
        .nav-btn {
            background: #4B0082;
            color: white;
        }
        
        .submit-btn {
            background: #dc3545;
            color: white;
        }
        
        /* Full-screen warning overlay */
        #fullscreen-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            z-index: 999999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        
        .warning-card {
            background: rgba(255, 0, 0, 0.2);
            border: 3px solid #ff4444;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            animation: pulse 1s infinite;
        }
        
        .warning-card h1 {
            color: #ff4444;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .warning-card p {
            color: white;
            font-size: 18px;
            margin: 15px 0;
            line-height: 1.6;
        }
        
        .warning-card button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        
        .warning-card .close-btn {
            background: #ff4444;
            margin-top: 10px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 99999;
        }
    </style>
</head>
<body>

<div id="fullscreen-warning" style="display: none;">
    <div class="warning-card">
        <h1>⚠️ FULL-SCREEN REQUIRED</h1>
        <p>This exam requires <strong>FULL-SCREEN MODE</strong> to continue.</p>
        <p>Please click the button below to enter full-screen mode.</p>
        <button id="enter-fullscreen-btn">🔒 ENTER FULL-SCREEN</button>
        <br>
        <button id="close-exam-btn" class="close-btn">❌ CLOSE EXAM</button>
    </div>
</div>

<div class="status" id="status">🔒 Full-screen Active</div>

<div class="exam-container" id="examContent">
    <div class="exam-card">
        <h1>📝 LFJC ONLINE EXAMINATION</h1>
        
        <div class="form-group">
            <label>NAME:</label>
            <input type="text" id="stuName" placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label>SECTION:</label>
            <input type="text" id="stuSection" placeholder="Enter section">
        </div>
        
        <div class="form-group">
            <label>ROLL NUMBER:</label>
            <input type="text" id="stuRoll" placeholder="Enter roll number">
        </div>
        
        <div class="question">
            <h3>Question 1</h3>
            <p>What is the capital of France?</p>
            <button class="optBtn" data-opt="A">A) London</button>
            <button class="optBtn" data-opt="B">B) Berlin</button>
            <button class="optBtn" data-opt="C">C) Paris</button>
            <button class="optBtn" data-opt="D">D) Madrid</button>
        </div>
        
        <div class="question">
            <h3>Question 2</h3>
            <p>What is 2 + 2?</p>
            <button class="optBtn" data-opt="A">A) 3</button>
            <button class="optBtn" data-opt="B">B) 4</button>
            <button class="optBtn" data-opt="C">C) 5</button>
            <button class="optBtn" data-opt="D">D) 6</button>
        </div>
        
        <div class="question">
            <h3>Question 3</h3>
            <p>Who painted the Mona Lisa?</p>
            <button class="optBtn" data-opt="A">A) Van Gogh</button>
            <button class="optBtn" data-opt="B">B) Picasso</button>
            <button class="optBtn" data-opt="C">C) Da Vinci</button>
            <button class="optBtn" data-opt="D">D) Rembrandt</button>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button class="submit-btn" id="submitBtn">📤 SUBMIT EXAM</button>
        </div>
    </div>
</div>

<script>
    let isFullScreen = false;
    let examStarted = false;
    let checkInterval = null;
    
    const warningDiv = document.getElementById('fullscreen-warning');
    const examContent = document.getElementById('examContent');
    const statusDiv = document.getElementById('status');
    const enterBtn = document.getElementById('enter-fullscreen-btn');
    const closeBtn = document.getElementById('close-exam-btn');
    
    // Function to enter full-screen
    async function enterFullScreen() {
        try {
            const elem = document.documentElement;
            
            if (elem.requestFullscreen) {
                await elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                await elem.webkitRequestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                await elem.mozRequestFullScreen();
            } else if (elem.msRequestFullscreen) {
                await elem.msRequestFullscreen();
            }
            
            isFullScreen = true;
            warningDiv.style.display = 'none';
            examContent.style.display = 'block';
            statusDiv.innerHTML = '🔒 Full-screen Active';
            statusDiv.style.background = '#28a745';
            
            console.log('✅ Full-screen mode activated');
            
        } catch (err) {
            console.error('Failed to enter full-screen:', err);
            alert('Please allow full-screen mode to take the exam');
        }
    }
    
    // Function to exit full-screen
    function exitFullScreen() {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    }
    
    // Function to close/kill the exam page
    function closeExam() {
        // Method 1: Clear everything and show message
        document.body.innerHTML = `
            <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                        background: black; color: white; display: flex; justify-content: center; 
                        align-items: center; flex-direction: column; z-index: 999999; text-align: center;">
                <h1 style="color: red;">🚫 EXAM TERMINATED</h1>
                <p style="font-size: 18px; margin: 20px;">You exited full-screen mode.</p>
                <p>Exam has been closed for security reasons.</p>
                <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">
                    Restart Exam
                </button>
            </div>
        `;
        
        // Method 2: Redirect to blank page
        // window.location.href = 'about:blank';
        
        // Method 3: Close window (may not work in all browsers)
        // window.close();
        
        console.log('❌ Exam closed - full-screen violation');
    }
    
    // Check full-screen status
    function checkFullScreen() {
        const isCurrentlyFullScreen = !!(document.fullscreenElement || 
                                         document.webkitFullscreenElement || 
                                         document.mozFullScreenElement || 
                                         document.msFullscreenElement);
        
        if (!isCurrentlyFullScreen && examStarted) {
            // User exited full-screen - CLOSE EXAM IMMEDIATELY
            console.log('⚠️ Full-screen exited! Closing exam...');
            closeExam();
        } else if (isCurrentlyFullScreen && examStarted) {
            isFullScreen = true;
            statusDiv.innerHTML = '🔒 Full-screen Active';
            statusDiv.style.background = '#28a745';
        }
    }
    
    // Listen for full-screen changes
    document.addEventListener('fullscreenchange', checkFullScreen);
    document.addEventListener('webkitfullscreenchange', checkFullScreen);
    document.addEventListener('mozfullscreenchange', checkFullScreen);
    document.addEventListener('MSFullscreenChange', checkFullScreen);
    
    // Prevent Escape key from exiting full-screen
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && examStarted) {
            e.preventDefault();
            e.stopPropagation();
            console.log('🔒 Escape key blocked');
            return false;
        }
        
        // Block F11
        if (e.key === 'F11') {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        
        // Block Print Screen
        if (e.key === 'PrintScreen') {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        
        // Block Alt+Tab (can't fully block, but we can detect)
        if (e.altKey && e.key === 'Tab') {
            e.preventDefault();
            alert('Alt+Tab is prohibited during exam!');
            closeExam();
            return false;
        }
        
        // Block Windows key
        if (e.key === 'Meta' || e.key === 'Win') {
            e.preventDefault();
            alert('Windows key is prohibited!');
            closeExam();
            return false;
        }
    });
    
    // Block right-click
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });
    
    // Block developer tools shortcuts
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey && e.shiftKey && e.key === 'I') ||  // Ctrl+Shift+I
            (e.ctrlKey && e.shiftKey && e.key === 'J') ||  // Ctrl+Shift+J
            (e.ctrlKey && e.key === 'U') ||                 // Ctrl+U
            (e.ctrlKey && e.key === 'S') ||                 // Ctrl+S
            (e.ctrlKey && e.key === 'P') ||                 // Ctrl+P
            (e.ctrlKey && e.key === 'R') ||                 // Ctrl+R
            e.key === 'F12') {                              // F12
            
            e.preventDefault();
            alert('Developer tools are disabled during exam!');
            closeExam();
            return false;
        }
    });
    
    // Tab switch detection - close exam immediately
    let tabSwitchCount = 0;
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && examStarted) {
            tabSwitchCount++;
            console.log(`⚠️ Tab switch #${tabSwitchCount}`);
            
            if (tabSwitchCount >= 1) {
                // Close exam on FIRST tab switch
                alert('Tab switching is prohibited! Exam closed.');
                closeExam();
            }
        }
    });
    
    // Start exam when user enters full-screen
    enterBtn.onclick = async () => {
        await enterFullScreen();
        examStarted = true;
        
        // Start periodic check (every 1 second)
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(() => {
            const isFs = !!(document.fullscreenElement || 
                           document.webkitFullscreenElement);
            if (!isFs && examStarted) {
                console.log('⚠️ Full-screen lost!');
                closeExam();
            }
        }, 1000);
    };
    
    // Close exam button
    closeBtn.onclick = () => {
        closeExam();
    };
    
    // Block window before unload
    window.addEventListener('beforeunload', function(e) {
        if (examStarted) {
            e.preventDefault();
            e.returnValue = 'Exam in progress. Are you sure?';
            return 'Exam in progress. Are you sure?';
        }
    });
    
    // Sample exam functions
    document.querySelectorAll('.optBtn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (!examStarted) return;
            document.querySelectorAll('.optBtn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
        });
    });
    
    function submitExam() {
        if (!examStarted) return;
        alert('Exam submitted successfully!');
        exitFullScreen();
        location.reload();
    }
    
    document.getElementById('submitBtn').onclick = () => {
        if (confirm('Submit exam?')) {
            submitExam();
        }
    };
    
    // Initial state
    examContent.style.display = 'none';
    warningDiv.style.display = 'flex';
    
    console.log('✅ Security system active');
    console.log('⚠️ Exam will CLOSE if full-screen is exited');
</script>
</body>
</html>
