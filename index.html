<!DOCTYPE html>
<html>
<head>
    <title>LFJC Exam Portal</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #4B0082;
        }
        a {
            display: inline-block;
            background: #4B0082;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
        a:hover {
            background: #6a1b9a;
            transform: scale(1.05);
        }
        .warning {
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 LFJC Exam Portal</h1>
        <p>Welcome to the LFJC Online Examination System</p>
        <p><strong>Instructions:</strong></p>
        <ul style="text-align: left;">
            <li>Click START to begin</li>
            <li>Full screen is required</li>
            <li>Do not switch tabs</li>
            <li>Do not use developer tools</li>
        </ul>
        <a href="https://1d-ana.pages.dev">START EXAM</a>
        <div class="warning">
            ⚠️ By clicking START, you agree to follow all exam rules
        </div>
    </div>
</body>
</html>
